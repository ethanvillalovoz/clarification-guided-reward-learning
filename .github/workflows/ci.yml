name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q

      - name: Generate deterministic artifacts
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/matplotlib
        run: clarification-reward-demo --output-dir artifacts/ci

      - name: Verify artifact contract
        run: |
          test -s artifacts/ci/trace.json
          test -s artifacts/ci/comparison.png
          test -s artifacts/ci/belief-update.gif

      - name: Upload reference artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: clarification-reward-learning-trace
          path: artifacts/ci/
